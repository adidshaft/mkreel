<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">mkreel terminal card</title>
  <desc id="desc">A dark terminal-style card with an ASCII-inspired mascot and quick guide for mkreel.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1120" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="glow" x1="220" y1="80" x2="520" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="24" y="24" width="1152" height="712" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="760" rx="28" fill="#020617"/>
  <g filter="url(#shadow)">
    <rect x="48" y="48" width="1104" height="664" rx="28" fill="url(#bg)"/>
    <rect x="48.5" y="48.5" width="1103" height="663" rx="27.5" stroke="#1E293B"/>
  </g>

  <circle cx="90" cy="80" r="8" fill="#FB7185"/>
  <circle cx="115" cy="80" r="8" fill="#FBBF24"/>
  <circle cx="140" cy="80" r="8" fill="#34D399"/>

  <text x="60" y="140" font-size="28" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace" xml:space="preserve">
    <tspan x="60" dy="0" fill="#38BDF8">       .---------======---------.</tspan>
    <tspan x="60" dy="36" fill="#38BDF8">    .  ___  _ "" "" "" _  ___  .</tspan>
    <tspan x="60" dy="36" fill="#38BDF8">  /  /    </tspan><tspan fill="#E5E7EB">\    .--.    /</tspan><tspan fill="#38BDF8">    \  \</tspan>
    <tspan x="60" dy="36" fill="#E5E7EB"> |   |    |  (o    o)  |    |   |</tspan>
    <tspan x="60" dy="36" fill="#E5E7EB"> |   |    |      --      |    |   |</tspan>
    <tspan x="60" dy="36" fill="#E5E7EB"> |   |    |   . |  | .   |    |   |</tspan>
    <tspan x="60" dy="36" fill="#E5E7EB">  \  \    /    \____/    \    /  /</tspan>
    <tspan x="60" dy="36" fill="#34D399">    .  ---  '----------'  ---  .</tspan>
    <tspan x="60" dy="36" fill="#34D399">        /  /          \  \</tspan>
    <tspan x="60" dy="36" fill="#34D399">      /_/            \_\</tspan>
  </text>

  <g transform="translate(60, 540)">
    <text y="0" font-size="32" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace">
      <tspan fill="#F97316" font-weight="700">mkreel</tspan>
      <tspan fill="#E5E7EB"> creator sidekick</tspan>
    </text>
    <text y="42" fill="#93C5FD" font-size="28" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace">
      clip it. crop it. caption it. ship it.
    </text>
  </g>

  <g transform="translate(680, 160)">
    <text y="0" fill="#38BDF8" font-size="34" font-weight="700" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace">
      Quick guide
    </text>
    <text y="50" fill="#E5E7EB" font-size="26" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace" xml:space="preserve">
      <tspan x="0" dy="0"><tspan font-weight="700">times</tspan>      use 8:43 or 00:08:43</tspan>
      <tspan x="0" dy="44"><tspan font-weight="700">reel</tspan>       best for Shorts, Reels, and TikTok-style exports</tspan>
      <tspan x="0" dy="44"><tspan font-weight="700">captions</tspan>   presets are ready-made, Custom / advanced is optional</tspan>
      <tspan x="0" dy="44"><tspan font-weight="700">cancel</tspan>     press Ctrl+C anytime</tspan>
    </text>
  </g>
</svg>
