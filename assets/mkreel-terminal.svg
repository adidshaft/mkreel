<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">mkreel terminal card</title>
  <desc id="desc">A dark terminal-style card with an ASCII-inspired mascot and quick guide for mkreel.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1120" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="glow" x1="220" y1="80" x2="520" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="24" y="24" width="1152" height="712" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="760" rx="28" fill="#020617"/>
  <g filter="url(#shadow)">
    <rect x="48" y="48" width="1104" height="664" rx="28" fill="url(#bg)"/>
    <rect x="48.5" y="48.5" width="1103" height="663" rx="27.5" stroke="#1E293B"/>
  </g>

  <circle cx="166" cy="104" r="10" fill="#FB7185"/>
  <circle cx="202" cy="104" r="10" fill="#FBBF24"/>
  <circle cx="238" cy="104" r="10" fill="#34D399"/>

  <rect x="74" y="132" width="340" height="264" rx="24" fill="url(#glow)"/>

  <text x="110" y="196" fill="#38BDF8" font-size="29" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">
    <tspan x="110" dy="0">      .----------------.</tspan>
    <tspan x="110" dy="36">   .-'  .------------.  '-.</tspan>
    <tspan x="110" dy="36">  /   .'   .------.   '.   \</tspan>
    <tspan x="110" dy="36"> /   /    /  .--.  \    \   \</tspan>
    <tspan x="110" dy="36">|   |    |  (o  o) |    |   |</tspan>
    <tspan x="110" dy="36">|   |    |   '--'  |    |   |</tspan>
    <tspan x="110" dy="36">|   |    |  .----. |    |   |</tspan>
    <tspan x="110" dy="36"> \   \    \ '--'' /    /   /</tspan>
    <tspan x="110" dy="36">  '-. '.   '----'   .' .-'</tspan>
    <tspan x="110" dy="36">      '----------------'</tspan>
  </text>

  <text x="118" y="450" fill="#F97316" font-size="34" font-weight="700" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">
    mkreel
  </text>
  <text x="272" y="450" fill="#E5E7EB" font-size="34" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">
    creator sidekick
  </text>
  <text x="118" y="494" fill="#93C5FD" font-size="32" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">
    clip it. crop it. caption it. ship it.
  </text>

  <text x="630" y="182" fill="#38BDF8" font-size="38" font-weight="700" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">
    Quick guide
  </text>

  <text x="630" y="244" fill="#E5E7EB" font-size="29" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">
    <tspan x="630" dy="0">times     use 8:43 or 00:08:43</tspan>
    <tspan x="630" dy="46">reel      best for Shorts, Reels, TikTok-style exports</tspan>
    <tspan x="630" dy="46">captions  presets are ready-made, Custom is optional</tspan>
    <tspan x="630" dy="46">cancel    press Ctrl+C anytime</tspan>
  </text>

  <rect x="630" y="470" width="396" height="140" rx="20" fill="#0B1220" stroke="#1E293B"/>
  <text x="664" y="524" fill="#A5B4FC" font-size="24" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">
    npm install -g mkreel
  </text>
  <text x="664" y="566" fill="#E5E7EB" font-size="24" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">
    npx mkreel https://youtu.be/...
  </text>
</svg>
